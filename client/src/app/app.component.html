@if (authService.session(); as session) {
  <div class="session-row">
    <button class="icon-btn home-btn" type="button" (click)="goHome()" title="Home" aria-label="Home">
      ⌂
    </button>

    <aside class="session-chip">
      <div class="identity">
        <span class="username">{{ session.user.username }}</span>
        <span class="role">{{ roleLabel() }}</span>
      </div>
      <button class="icon-btn logout-btn" type="button" (click)="logout()" title="Logout" aria-label="Logout">
        ⏻
      </button>
    </aside>
  </div>
}

<router-outlet></router-outlet>
